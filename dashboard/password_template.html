        <style>
            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #262626;
            }

            .staticrypt-page {
                width: 360px;
                padding: 8% 0 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #141414;
                max-width: 360px;
                margin: 0 auto 100px;
                padding: 45px;
                text-align: center;
                border-radius: 12px;
                border: 1px solid #262626;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box;
                font-size: 14px;
                outline: 0;
                padding: 15px 30px 15px 15px;
                width: 100%;
                color: #e5e5e5;
            }

            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder {
                color: #525252;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: #1a1a1a;
                width: 100%;
                border: 1px solid #262626;
                border-radius: 12px;
                margin: 0 0 15px;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 60%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                filter: invert(1);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: #00a3e7;
                width: 100%;
                border: 0;
                border-radius: 12px;
                padding: 15px;
                color: #ffffff;
                font-size: 14px;
                font-weight: 600;
                letter-spacing: 0.5px;
                cursor: pointer;
                transition: all 0.2s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #1782d5;
                transform: scale(1.02);
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 1em;
                background: #0a0a0a;
                font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-instructions {
                margin-top: -1em;
                margin-bottom: 1em;
                color: #737373;
                font-size: 14px;
            }

            .staticrypt-title {
                font-size: 1.5em;
                color: #e5e5e5;
                font-weight: 700;
                letter-spacing: -0.5px;
            }

            .staticrypt-title span {
                color: #00a3e7;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
                color: #737373;
                font-size: 13px;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.5);
                margin-right: 1em;
                accent-color: #00a3e7;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0a0a0a;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid #262626;
                border-right-color: #00a3e7;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

        <script>
            // these variables will be filled when generating the file - the template format is '/*[|variable_name|]*/0'
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",
                templateToggleAltShow = "/*[|template_toggle_show|]*/0",
                templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            // you can edit these values to customize some of the behavior of StatiCrypt
            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            // init the staticrypt engine
            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // try to automatically decrypt on load if there is a saved password
            window.onload = async function () {
                // Check URL params for password (from form GET submission - enables Chrome password save)
                const urlParams = new URLSearchParams(window.location.search);
                const urlPassword = urlParams.get("password");
                preserveDashboardRouteParams(urlParams);

                if (urlPassword) {
                    // Clean only auth params from the URL immediately. Keep dashboard route params.
                    urlParams.delete("password");
                    urlParams.delete("remember");
                    const nextSearch = urlParams.toString();
                    window.history.replaceState(
                        {},
                        "",
                        `${window.location.pathname}${nextSearch ? "?" + nextSearch : ""}${window.location.hash || ""}`
                    );
                    // Decrypt with the URL password, auto-remember
                    const result = await staticrypt.handleDecryptionOfPage(urlPassword, true);
                    if (result.isSuccessful) return;
                    // Wrong password - fall through to show prompt
                }

                // Try StatiCrypt's built-in auto-decrypt (localStorage/hash)
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();

                    if (isRememberEnabled) {
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                    }
                }
            };

            function preserveDashboardRouteParams(urlParams) {
                const routeParamNames = ["screen", "date", "customerType", "serviceType"];
                const form = document.getElementById("staticrypt-form");
                routeParamNames.forEach(name => {
                    const value = urlParams.get(name);
                    if (!value) return;
                    let input = form.querySelector(`input[type="hidden"][name="${name}"]`);
                    if (!input) {
                        input = document.createElement("input");
                        input.type = "hidden";
                        input.name = name;
                        form.appendChild(input);
                    }
                    input.value = value;
                });
            }

                    toggleIcon.alt = templateToggleAltHide;
                    toggleIcon.title = templateToggleAltHide;
                } else {
                    passwordInput.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;

            // Form submits naturally as GET - page reloads with ?password=xxx
            // Chrome sees a real form submission + navigation = offers to save password
            // On reload, the onload handler reads ?password= and decrypts
        </script>
